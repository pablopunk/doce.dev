services:
  preview:
    build:
      context: .
      dockerfile: Dockerfile.preview
      args:
        PREVIEW_BASE_IMAGE: ${DOCE_PREVIEW_BASE_IMAGE:-node:22-alpine}
    volumes:
      - type: bind
        source: ${PROJECT_PREVIEW_BIND_MOUNT}
        target: /app
      - preview_node_modules:/app/node_modules
      - pnpm-store:/root/.local/share/pnpm/store
    ports:
      - "${DEV_PORT:-4321}:4321"
    environment:
      - HOST=0.0.0.0
    networks:
      - default
      - doce-shared

volumes:
  preview_node_modules:
    name: doce_${PROJECT_ID}_preview_node_modules
  pnpm-store:
    external: true
    name: doce-global-pnpm-store

networks:
  default:
  doce-shared:
    external: true
    name: ${DOCE_NETWORK:-doce-shared}
