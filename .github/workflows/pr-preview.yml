name: PR Preview Environment

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
  pull_request_review:
    types: [submitted, dismissed]

jobs:
  check-approval:
    name: Check PR Approval
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    steps:
      - name: Check approval status
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEWER: ${{ github.event.review && github.event.review.user.login || '' }}
          REVIEW_STATE: ${{ github.event.review && github.event.review.state || '' }}
        run: |
          # Check if author has write permissions
          AUTHOR_PERMS=$(gh api repos/${{ github.repository }}/collaborators/$PR_AUTHOR/permission --jq '.permission' 2>/dev/null || echo "none")
          echo "Author ($PR_AUTHOR) permission: $AUTHOR_PERMS"
          
          # Define write-level permissions
          WRITE_PERMS="admin maintain write"
          
          # Check if author has write access (auto-approve)
          if echo "$WRITE_PERMS" | grep -qw "$AUTHOR_PERMS"; then
            echo "approved=true" >> "$GITHUB_OUTPUT"
            echo "✅ Author has write access, auto-approved"
            exit 0
          fi
          
          # If triggered by a review, check if reviewer has write access
          if [ "$REVIEW_STATE" = "approved" ] && [ -n "$REVIEWER" ]; then
            REVIEWER_PERMS=$(gh api repos/${{ github.repository }}/collaborators/$REVIEWER/permission --jq '.permission' 2>/dev/null || echo "none")
            echo "Reviewer ($REVIEWER) permission: $REVIEWER_PERMS"
            
            if echo "$WRITE_PERMS" | grep -qw "$REVIEWER_PERMS"; then
              echo "approved=true" >> "$GITHUB_OUTPUT"
              echo "✅ Reviewer has write access, approved"
              exit 0
            else
              echo "approved=false" >> "$GITHUB_OUTPUT"
              echo "❌ Reviewer lacks write permissions"
              exit 1
            fi
          fi
          
          # For pull_request events (open/reopen/sync), check if there's already an approved review
          if [ -n "$PR_NUMBER" ]; then
            echo "Checking for existing approved reviews..."
            # Get the first approved review
            APPROVED_BY=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews \
              --jq '.[] | select(.state == "APPROVED") | .user.login' 2>/dev/null | head -1)
            
            if [ -n "$APPROVED_BY" ]; then
              echo "Found approval from: $APPROVED_BY"
              APPROVER_PERMS=$(gh api repos/${{ github.repository }}/collaborators/$APPROVED_BY/permission --jq '.permission' 2>/dev/null || echo "none")
              echo "Approver permission: $APPROVER_PERMS"
              
              if echo "$WRITE_PERMS" | grep -qw "$APPROVER_PERMS"; then
                echo "approved=true" >> "$GITHUB_OUTPUT"
                echo "✅ Existing approval from write-access user"
                exit 0
              fi
            fi
          fi
          
          # No valid approval found
          echo "approved=false" >> "$GITHUB_OUTPUT"
          echo "❌ No valid approval from write-access user"
          exit 1

  deploy:
    name: Deploy PR Preview
    needs: check-approval
    runs-on: self-hosted
    if: |
      needs.check-approval.outputs.approved == 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.action != 'closed'
    permissions:
      contents: read
      deployments: write
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Check if Dockerfile changed
        id: dockerfile-check
        run: |
          if git diff origin/main...HEAD -- Dockerfile | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Dockerfile has changes, will rebuild image"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Dockerfile unchanged, will reuse main branch image"
          fi

      - name: Clean Tailscale cache
        run: rm -f ~/.cache/tailscale.tgz

      - name: Stop any running Tailscale
        run: |
          sudo pkill -f tailscaled 2>/dev/null || true
          sudo rm -f /usr/local/bin/tailscale /usr/local/bin/tailscaled 2>/dev/null || true
          sleep 2

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          use-cache: false

      - name: Extract PR number
        id: pr
        run: echo "number=${{ github.event.number }}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub deployment
        id: gh-deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUM: ${{ github.event.number }}
        run: |
          DEPLOYMENT_ID=$(jq -n \
            --arg ref "$SHA" \
            --arg env "pr-$PR_NUM" \
            --arg desc "Preview for PR #$PR_NUM" \
            '{ref:$ref, environment:$env, description:$desc, auto_merge:false, required_contexts:[], transient_environment:true, production_environment:false}' \
            | gh api --method POST \
              -H "Accept: application/vnd.github+json" \
              repos/${{ github.repository }}/deployments \
              --input - \
              --jq '.id')
          echo "id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"
          gh api --method POST \
            repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses \
            -f state=in_progress \
            -f description="Deploying preview..."

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H doce.pangolin-frog.ts.net >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Docker cleanup
        run: |
          ssh root@doce.pangolin-frog.ts.net "docker system prune -af --volumes || true"

      - name: Deploy preview
        id: deploy
        run: |
          set -e
          PR_NUM=${{ steps.pr.outputs.number }}
          VM_HOST="doce.pangolin-frog.ts.net"
          SSH_USER="root"
          PR_DIR="/root/previews/pr-$PR_NUM"
          REPO_DIR="$PR_DIR/repo"
          SCRIPTS_DIR="/root/previews/scripts"

          echo "🚀 Deploying PR #$PR_NUM to $VM_HOST"

          # Step 1: Clean up stale previews for closed PRs
          echo "🧹 Cleaning up stale previews..."
          
          # Get list of open PR numbers from GitHub
          OPEN_PRS=$(gh pr list --state open --json number --jq '.[].number')
          
          # Get list of existing PR directories on server
          EXISTING_DIRS=$(ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" \
            "ls -d /root/previews/pr-* 2>/dev/null | xargs -n1 basename 2>/dev/null || true")
          
          # For each existing directory, check if the PR is still open
          for dir in $EXISTING_DIRS; do
            DIR_PR_NUM=$(echo "$dir" | sed 's/pr-//')
            IS_OPEN=false
            for open_pr in $OPEN_PRS; do
              if [ "$DIR_PR_NUM" = "$open_pr" ]; then
                IS_OPEN=true
                break
              fi
            done
            
            if [ "$IS_OPEN" = "false" ]; then
              echo "🗑️  Cleaning up stale preview for PR #$DIR_PR_NUM (PR is closed)"
              ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" \
                "cd /root/previews/$dir && docker-compose down 2>/dev/null || true"
              ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" \
                "$SCRIPTS_DIR/release-port.sh $DIR_PR_NUM 2>/dev/null || true"
              ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" \
                "docker rmi -f doce-pr-$DIR_PR_NUM:latest 2>/dev/null || true"
              ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" \
                "docker volume rm pr-${DIR_PR_NUM}_pr_${DIR_PR_NUM}_data 2>/dev/null || true"
              ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" \
                "docker volume ls -q | grep -E '^pr-${DIR_PR_NUM}_|^doce_[a-f0-9]+_${DIR_PR_NUM}_' | xargs -r docker volume rm 2>/dev/null || true"
              ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" \
                "rm -rf /root/previews/$dir"
            fi
          done
          
          # Also clean up any leftover containers from previous runs of this PR
          echo "📦 Cleaning up stale containers for PR #$PR_NUM..."
          ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" \
            "docker rm -f doce-pr-$PR_NUM 2>/dev/null || true; cd /root/previews && for dir in pr-*; do [ -d \"\$dir\" ] && (cd \"\$dir\" && docker-compose down 2>/dev/null || true) || true; done"
          
          # Clean up stale volumes for this PR
          echo "🧹 Cleaning up stale volumes for PR #$PR_NUM..."
          ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" \
            "docker volume rm pr-${PR_NUM}_pr_${PR_NUM}_data 2>/dev/null || true"
          ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" \
            "docker volume ls -q | grep -E '^pr-${PR_NUM}_|^doce_[a-f0-9]+_${PR_NUM}_' | xargs -r docker volume rm 2>/dev/null || true"

          # Step 2: Create PR directory
          echo "📁 Creating PR directory..."
          ssh -o StrictHostKeyChecking=no $SSH_USER@$VM_HOST "mkdir -p $PR_DIR \"$REPO_DIR\""

           # Step 2.5: Remove old containers to force container recreation
           echo "🧹 Stopping old containers to pick up new template..."
           ssh -o StrictHostKeyChecking=no $SSH_USER@$VM_HOST \
             "cd $PR_DIR && docker-compose down 2>/dev/null || true"

           # Step 2.75: Ensure global pnpm volume exists
           echo "📦 Ensuring global pnpm volume exists..."
           ssh -o StrictHostKeyChecking=no $SSH_USER@$VM_HOST \
             "docker volume create doce-global-pnpm-store 2>/dev/null || true"

            # Step 3: Copy PR code to VM via tar
           echo "📋 Copying PR code..."
           tar czf - --exclude=node_modules --exclude=.git --exclude=dist --exclude=data . | \
             ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" "cd \"$REPO_DIR\" && tar xzf -"

          # Step 4: Allocate port
          echo "🔌 Allocating port..."
          PORT=$(ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" "$SCRIPTS_DIR/allocate-port.sh $PR_NUM")
          echo "Allocated port: $PORT"

          # Step 5: Prepare Docker image
          DOCKERFILE_CHANGED="${{ steps.dockerfile-check.outputs.changed }}"

          if [ "$DOCKERFILE_CHANGED" = "true" ]; then
            echo "🔨 Building Docker image (Dockerfile changed)..."
            echo "⏱️ Build started at $(date)"
            ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" \
              "cd \"$REPO_DIR\" && DOCKER_BUILDKIT=1 docker build -t doce-pr-$PR_NUM:latest ."
            echo "⏱️ Build completed at $(date)"
          else
            echo "📥 Pulling pre-built image from registry (Dockerfile unchanged)..."
            # Drop any stale ghcr.io credentials so public pulls fall back to anonymous
            ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" \
              "docker logout ghcr.io 2>/dev/null || true"
            ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" \
              "docker pull ghcr.io/${{ github.repository_owner }}/doce.dev:latest && \
               docker tag ghcr.io/${{ github.repository_owner }}/doce.dev:latest doce-pr-$PR_NUM:latest"
          fi

          # Step 6: Generate compose file from template
          echo "📝 Generating docker-compose.yml..."
          ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" \
            "cd \"$REPO_DIR\" && PR_NUM=$PR_NUM PORT=$PORT envsubst < docker-compose.preview.yml > \"$PR_DIR/docker-compose.yml\""

          # Step 7: Start preview environment with docker-compose
          echo "▶️  Starting preview environment on port $PORT..."
          ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" \
            "cd \"$PR_DIR\" && docker-compose up -d"

          # Step 8: Wait for app to be healthy
          echo "⏳ Waiting for app to start..."
          for i in {1..60}; do
            if ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" \
              "curl -f http://localhost:$PORT/ 2>/dev/null" >/dev/null 2>&1; then
              echo "✅ App is healthy!"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "❌ App failed to start after 60 seconds"
              ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" "cd \"$PR_DIR\" && docker-compose logs app" || true
              exit 1
            fi
            echo "Waiting for app... ($i/60)"
            sleep 1
          done

          echo "✅ PR preview deployed successfully!"
          echo "port=$PORT" >> "$GITHUB_OUTPUT"

      - name: Mark deployment success
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PORT=${{ steps.deploy.outputs.port }}
          PREVIEW_URL="http://doce.pangolin-frog.ts.net:$PORT"
          gh api --method POST \
            repos/${{ github.repository }}/deployments/${{ steps.gh-deployment.outputs.id }}/statuses \
            -f state=success \
            -f environment_url="$PREVIEW_URL" \
            -f description="Preview deployed"

      - name: Mark deployment failure
        if: failure() && steps.gh-deployment.outputs.id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method POST \
            repos/${{ github.repository }}/deployments/${{ steps.gh-deployment.outputs.id }}/statuses \
            -f state=failure \
            -f description="Preview deployment failed"

  teardown:
    name: Cleanup PR Preview
    runs-on: self-hosted
    if: github.event.action == 'closed'
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Clean Tailscale cache
        run: rm -f ~/.cache/tailscale.tgz

      - name: Stop any running Tailscale
        run: |
          sudo pkill -f tailscaled 2>/dev/null || true
          sudo rm -f /usr/local/bin/tailscale /usr/local/bin/tailscaled 2>/dev/null || true
          sleep 2

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          use-cache: false

      - name: Extract PR number
        id: pr
        run: echo "number=${{ github.event.number }}" >> "$GITHUB_OUTPUT"

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H doce.pangolin-frog.ts.net >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Stop preview
        run: |
          set -e
          PR_NUM=${{ steps.pr.outputs.number }}
          VM_HOST="doce.pangolin-frog.ts.net"
          SSH_USER="root"
          SCRIPTS_DIR="/root/previews/scripts"
          PR_DIR="/root/previews/pr-$PR_NUM"

          echo "🧹 Cleaning up PR #$PR_NUM preview"

          # Stop containers (ignore if directory doesn't exist)
          ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" \
            "[ -d \"$PR_DIR\" ] && cd \"$PR_DIR\" && docker-compose down 2>/dev/null || true"

          ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" "$SCRIPTS_DIR/release-port.sh $PR_NUM 2>/dev/null || true"

          ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" "docker rmi -f doce-pr-$PR_NUM:latest 2>/dev/null || true"

          ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" \
            "docker volume rm pr-${PR_NUM}_pr_${PR_NUM}_data 2>/dev/null || true"

          ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" \
            "docker volume ls -q | grep -E '^pr-${PR_NUM}_|^doce_[a-f0-9]+_${PR_NUM}_' | xargs -r docker volume rm 2>/dev/null || true"

          ssh -o StrictHostKeyChecking=no "$SSH_USER@$VM_HOST" "rm -rf \"$PR_DIR\" 2>/dev/null || true"

          echo "✅ PR preview cleaned up!"

      - name: Deactivate GitHub deployments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ steps.pr.outputs.number }}
        run: |
          ENV_NAME="pr-$PR_NUM"
          DEPLOYMENTS=$(gh api "repos/${{ github.repository }}/deployments?environment=$ENV_NAME" --jq '.[].id')
          for id in $DEPLOYMENTS; do
            gh api --method POST \
              repos/${{ github.repository }}/deployments/$id/statuses \
              -f state=inactive \
              -f description="PR closed" || true
          done
          gh api --method DELETE "repos/${{ github.repository }}/environments/$ENV_NAME" 2>/dev/null || true

